  "whatis": "An autoimmune and degenerative disease of the CNS in which the immune system attacks and destroys myelin sheaths (produced by oligodendrocytes), creating multiple hard plaques (areas of demyelination) at different sites in the brain and spinal cord. It is characterised by lesions disseminated in both place and time. Contributing factors include a combination of environmental and genetic influences that result in loss of tolerance to myelin. Focal demyelination initially allows some remyelination, but repair capacity eventually fails, lesions accumulate, and axonal death occurs, leading to progressive neurological disability.",
  "symptoms": "Visual: optic neuritis (pain, blurred vision, impaired acuity, impaired colour vision, visual field defect) — a common presenting symptom. Eye movement: internuclear ophthalmoplegia, nystagmus. Motor: spastic paraparesis (pyramidal tract signs in ~80% long-term), weakness predominantly of lower extremities, balance problems, speech and swallowing difficulties; approximately 50% of patients are unable to walk unaided within 15 years of diagnosis. Sensory: hypaesthesia, numbness, paraesthesia, Lhermitte's sign (tingling shooting into limbs on neck flexion), pain in limbs or trigeminal distribution. Cognitive/psychiatric: depression, cognitive problems (concentration, reasoning, problem-solving) in ~50%. Other: bladder disturbance, erectile dysfunction. Note: many plaques are clinically silent. Episodes of neurological symptoms are characteristically separated in time and place.",
  "diagnosis": "1. MRI (dominant method): FLAIR sequence shows hyperintense (bright) plaques characteristically perpendicular to the ventricular system (Dawson's fingers pattern); demyelinating plaques located periventricularly, in the cerebellum, and spinal cord; Central Vein Sign (thin hypointense line within lesion on susceptibility-weighted MRI); Paramagnetic Rim Lesions (dark rim indicating chronic active inflammation). 2. Gross pathology: multiple well-circumscribed, slightly depressed, glassy, gray-tanned, irregularly shaped plaques near CSF spaces (periventricular, subependymal, subpial), optic tract, cervical spinal cord, and brain white matter. 3. Histology by plaque stage: active plaques show macrophages with myelin debris and perivascular lymphocytic cuffs; inactive plaques show hypocellularity with gliosis and no active myelin breakdown; shadow plaques show reduced myelin density with disproportionately thin sheaths indicating remyelination. Stains used: Luxol fast blue (myelin), neurofilament IHC (axons), CD68 (macrophages), CD3/CD8 (T lymphocytes), HLA-DR (microglia). 4. Visual Evoked Potential (VEP): prolonged latency of the ~100 ms wave indicating delayed central visual conduction. 5. CSF examination: mild pleocytosis (increased lymphocytes in active phase), elevated protein, oligoclonal bands on electrophoresis (local IgG synthesis), kappa free light chains, increased IgG index (≥0.7 in ~90%), myelin basic protein (>1 ng/ml in ~80% of acute relapses). Note: all tests can produce false positives or negatives.",
  "prognosis": "Four recognised clinical courses: (1) Benign (~5%) — few episodes, minimal neurological disability at 10–15 years. (2) Relapsing-Remitting (RRMS, ~85%) — relapses with recovery and minimal residual disability between episodes, persisting over years to decades. (3) Secondary Progressive (SPMS, affects 60–80% of RRMS patients) — RRMS eventually loses remissions and accumulates progressive disability. (4) Primary Progressive (~10%) — steady worsening from onset with no remissions; considered to have the worst prognosis. Malignant MS (rare extreme): requires ambulation assistance within 5 years. Concepts of relapse-associated worsening (RAW) and progression independent of relapse activity (PIRA) are recognised. Prognosis for an individual is difficult to predict. Histologically, plaques progress through active (ongoing inflammation and demyelination), inactive/chronic silent (remission, gliosis, no inflammation), and burnt-out (complete loss of inflammatory infiltrate) stages. Remyelination can occur (shadow plaques), most commonly in younger patients, but repair capacity ultimately fails in older lesions, leading to axonal death.",
  "treatment": "RELAPSE TREATMENT: IV methylprednisolone 1 g/day for 3–5 days (or oral 500 mg/day for 5 days) to hasten recovery; does not alter long-term outcome; risks include osteoporosis, avascular necrosis, sleep/mood disturbance. DISEASE-MODIFYING THERAPIES (DMTs): • Interferon-β (Avonex, Rebif, Betaferon) — reduces leukocyte proliferation, antigen presentation, cytokine production, and T-cell migration via matrix metalloproteinases. • Glatiramer acetate (Copaxone, SC 20 mg daily) — shifts Th1 to Th2 regulatory cells; bystander suppression of autoreactive Th1 cells; ~30% relapse reduction. • Natalizumab (Tysabri, IV monthly) — anti-α4-integrin antibody preventing immune cell migration across the blood-brain barrier; ~68% relapse reduction, 80–90% reduction in new MRI lesions, 42% reduction in disability progression. • Teriflunomide (Aubagio) — decreases lymphocyte proliferation; ~30% relapse reduction; RRMS. • Dimethyl fumarate (Tecfidera) — amplifies Th2 responses, antioxidative and immunoregulatory, modulates antigen-presenting cell differentiation; ~50% relapse reduction; RRMS. • Fingolimod (Gilenya, first oral FDA-approved for MS) — binds S1P receptor on lymphocytes causing receptor internalisation and sequestration of lymphocytes in lymphoid tissue; ~55% relapse reduction; RRMS. • Ocrelizumab (Ocrevus) — anti-CD20 monoclonal antibody depleting B cells via antibody-dependent cellular cytotoxicity; ~46–47% relapse reduction vs IFN; 24% reduction in disability progression; approved for both RRMS and PPMS. • Alemtuzumab — anti-CD52 humanised monoclonal antibody depleting mature lymphocytes; ~70% relapse reduction vs placebo, ~50% vs interferons; RRMS with ≥2 relapses/year. • Mitoxantrone — immune-suppressing agent. SYMPTOMATIC TREATMENT: Baclofen/diazepam for spasticity; anticholinergics for bladder symptoms; Sativex (cannabidiol + THC) for neuropathic pain.",
  "hook": "MS = 'Many Scars' scattered in space and time — picture myelin as electrical wire insulation being stripped away in multiple spots by immune cells, causing short circuits (symptoms) that flare and sometimes repair, leaving glassy gray scars wherever they've been."
 },

  "symptoms": "Progressive joint pain and dysfunction; pain related to activity and partially relieved by rest (e.g., walking, stairs). Gradually increasing limitation of motion, especially after inactivity (morning stiffness). Crepitation (painless or dull aching). Stiffness and limited range of motion. In severe cases, a locked joint when a piece of cartilage breaks off. Deformity including varus knee deformity, Heberden's nodes at DIPs, and Bouchard's nodes at PIPs. Abnormal gait: Trendelenburg gait in hip OA, stiff knee gait in knee OA, slow shuffling gait with spinal stenosis. Referred or radicular pain possible. Structural signs include damaged and eroded cartilage, bony growths (osteophytes) around joint edges, and mild synovitis. Symptoms gradually worsen over time.",
  "diagnosis": "Clinical assessment of joint involvement, deformity, gait, risk factors, and age. X-ray findings: asymmetric joint space narrowing, dense sclerosis of subchondral bone, subchondral cysts, and large marginal osteophytes. Histological/structural findings include fibrillation and fissuring of cartilage, synovial lining cell hyperplasia, mononuclear cell perivascular aggregates, increased vascularity, subintimal fibrosis, osteophyte formation, and subchondral bone sclerosis. Biochemical markers are emphasised as non-invasive, reliable, and valid aids for early diagnosis, including: products of bone and cartilage degradation (procollagen C-terminal telopeptide, procollagen N-terminal telopeptide, collagen type II specific neoepitope, cartilage matrix protein, aggrecan neoepitope, and matrix metalloproteinases/MMPs); and pro- and anti-inflammatory cytokines (IL-1β, TNF-α, IGF, IL-10, IL-13, IL-4).",
  "prognosis": "OA is a slowly progressive disease with no cure; signs and symptoms gradually worsen over time and severity increases with advancing age. Younger-onset OA is usually secondary to another cause. In early stages, if the initial insult is removed before collagen fibrillation occurs, cartilage can restore its proteoglycan content. Once fibrillation is established, cartilage has poor capacity to repair because it is avascular and lacks incoming circulatory cells (macrophages, stem cells). A 'vicious cycle' exists whereby cartilage degradation products drive further inflammation (via IL-1β, TNF-α) and matrix breakdown by MMPs, perpetuating and accelerating the disease. Leads to significant disability and invalidism if untreated; joint replacement may be required in advanced cases.",
  "treatment": "Currently no treatment reverses OA or restores cartilage thickness or function. Principal aims are pain management and improving joint function. Non-pharmacological: patient education, weight reduction if obese, exercise programmes, physiotherapy, heat modalities, knee supports, walkers/crutches, TENS, shock-absorbing shoes, and manual therapy. Pharmacological: analgesics (paracetamol), topical and oral NSAIDs/COX-2 inhibitors (reduce pain and COX-mediated inflammation; caution for cardiovascular and hypertensive side effects in the elderly), opioids, duloxetine and amitriptyline (central pain processing), capsaicin, intra-articular corticosteroid injections (for effusion/synovitis), viscosupplementation with hyaluronan, glucosamine/chondroitin sulfate (chondroprotective). Molecular/emerging therapies: IL-1 inhibitor (diacerein), TGF-β inhibition, MMP activity inhibition, anti-NGF monoclonals (tanezumab), FGF-18, strontium ranelate, cannabinoids. Cytokines are noted both as targets for therapeutic agents and as therapeutic agents themselves. Surgical: osteotomy, debridement, partial or total prosthetic joint replacement. Regenerative: autologous chondrocyte implantation and stem cell implantation for small defects.",
  "hook": "OA = 'Old And Achy': proteoglycans LEAVE → water LEAVES → cartilage CRACKS → MMPs ATTACK → osteophytes GROW → joint LOCKS. The vicious cycle: damage → cytokines (IL-1β, TNF-α) → MMPs → more damage. Bonus node mnemonic: Heberden = Distal (H before B, DIP before PIP); Bouchard = Proximal."

  "prognosis": "Progressive disorder with worsening beta-cell failure over time. Insulin resistance begins in muscle and fat, later involving the liver; beta-cell insulin output eventually declines to the point of requiring insulin therapy. Amyloid plaque accumulation in beta cells may accelerate cell death. Complications (nephropathy, retinopathy, neuropathy, cardiovascular disease, peripheral vascular disease, foot infections) worsen as HbA1c rises. Tight glycaemic control significantly reduces complication risk — a 1% reduction in HbA1c significantly reduces MI, microvascular complications, peripheral vascular disease, and diabetes-related death. Lifestyle changes can prevent or delay progression from IGT/IFG to frank T2DM.",

}

 let a=`<div class="disease">${esc(d.disease)}</div>`;
 if(d.whatis)a+=`<div><b>What it is:</b> ${esc(d.whatis)}</div>`;
 if(d.symptoms)a+=`<div style="margin-top:6px"><b>Symptoms:</b> ${esc(d.symptoms)}</div>`;
 if(d.diagnosis)a+=`<div style="margin-top:6px"><b>Diagnosis:</b> ${esc(d.diagnosis)}</div>`;
 if(d.treatment)a+=`<div style="margin-top:6px"><b>Treatment:</b> ${esc(d.treatment)}</div>`;
 if(d.prognosis)a+=`<div style="margin-top:6px"><b>Prognosis:</b> ${esc(d.prognosis)}</div>`;
 if(d.hook)a+=`<div style="margin-top:6px"><b>Memory hook:</b> ${esc(d.hook)}</div>`;
 return a;
}
function makeOptions(d){let same=DATA.filter(x=>x.category===d.category&&x.disease!==d.disease);if(same.length<3)same=DATA.filter(x=>x.disease!==d.disease);shuffle(same);return shuffle([d.disease,...same.slice(0,3).map(x=>x.disease)]);}
function render(){
 if(!pool.length){stage.innerHTML='<div class="card">No diseases match this filter.</div>';score.textContent="";return;}
 if(idx>=pool.length){stage.innerHTML=`<div class="card"><div class="disease">Round complete</div>You scored ${right} of ${seen}. Press Start to shuffle again.</div>`;score.textContent="";return;}
 const d=pool[idx];answered=false;
 let html=`<div class="card"><span class="tag">${esc(d.category)}</span><span class="tag">Taught in ${d.times} lecture(s)</span><div class="q" style="margin-top:10px;font-weight:bold">Which disease fits these clues?</div>${clues(d)}`;
 if(mode==="mc"){
  const opts=makeOptions(d);
  html+='<div class="opts">'+opts.map(o=>`<button class="opt" data-name="${esc(o)}">${esc(o)}</button>`).join("")+"</div>";
  html+=`<div class="answer" id="ans">${fullAnswer(d)}<div class="controls"><button class="primary" id="next">Next</button></div></div></div>`;
  stage.innerHTML=html;
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{if(answered)return;answered=true;seen++;const chosen=b.getAttribute("data-name");document.querySelectorAll(".opt").forEach(x=>{x.disabled=true;if(x.getAttribute("data-name")===d.disease)x.classList.add("correct");else if(x===b)x.classList.add("wrong");});if(chosen===d.disease)right++;document.getElementById("ans").classList.add("show");});
  document.getElementById("next").onclick=()=>{idx++;render();};
 }else{
  html+=`<div class="controls"><button id="reveal">Reveal answer</button></div><div class="answer" id="ans">${fullAnswer(d)}<div class="controls"><button class="primary" id="got">I knew it</button><button id="miss">I missed it</button></div></div></div>`;
  stage.innerHTML=html;
  document.getElementById("reveal").onclick=()=>document.getElementById("ans").classList.add("show");
  document.getElementById("got").onclick=()=>{right++;seen++;idx++;render();};
  document.getElementById("miss").onclick=()=>{seen++;idx++;render();};
 }
 score.textContent=`Card ${idx+1} of ${pool.length} | score ${right}/${seen}`;
}
document.getElementById("start").onclick=build;build();
</script></body></html>
