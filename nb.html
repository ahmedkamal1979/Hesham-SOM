<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NB Module — Question Bank</title>
<style>
  :root{
    --bg:#f4f1ea; --paper:#fffdf8; --ink:#1f2a2e; --muted:#5d6b6f;
    --line:#e3ddd0; --accent:#0f766e; --accent-soft:#d7eae6;
    --correct:#15803d; --correct-bg:#e6f4ea; --wrong:#b91c1c; --wrong-bg:#fbeaea;
    --shadow:0 1px 2px rgba(31,42,46,.06),0 8px 24px rgba(31,42,46,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#10171a; --paper:#172226; --ink:#e8eeec; --muted:#92a3a6;
    --line:#243034; --accent:#5eead4; --accent-soft:#13312e;
    --correct:#4ade80; --correct-bg:#10291a; --wrong:#f87171; --wrong-bg:#2a1414;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    line-height:1.55; -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 18px 80px}
  header{padding:14px 0 10px;border-bottom:1px solid var(--line);margin-bottom:18px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand .ey{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .brand h1{font-family:var(--serif);font-size:30px;font-weight:600;margin:0;letter-spacing:-.01em}
  .brand .sub{font-size:13px;color:var(--muted)}
  .theme-btn{background:var(--paper);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--sans)}
  .theme-btn:active{transform:scale(.97)}

  .controls{background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:16px;box-shadow:var(--shadow);margin-bottom:18px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .row + .row{margin-top:12px}
  .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    width:100%;margin-bottom:2px;font-weight:700}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted);padding:8px 16px;border-radius:999px;
    font-size:14px;cursor:pointer;font-family:var(--sans);font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  html[data-theme="dark"] .seg button.on{color:#06201d}
  .chip{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
  .chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  select{appearance:none;-webkit-appearance:none;background:var(--bg);border:1px solid var(--line);
    color:var(--ink);border-radius:12px;padding:10px 14px;font-size:14px;font-family:var(--sans);
    width:100%;max-width:100%}
  .start{margin-top:14px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  html[data-theme="dark"] .start{color:#06201d}
  .start:active{transform:scale(.99)}

  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--muted)}
  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:16px}
  .bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s ease}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
  .tagline{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tag{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-weight:700}
  .tag.d-easy{color:var(--correct);border-color:var(--correct)}
  .tag.d-medium{color:var(--accent);border-color:var(--accent)}
  .tag.d-hard{color:var(--wrong);border-color:var(--wrong)}
  .qtext{font-family:var(--serif);font-size:21px;line-height:1.45;margin:0 0 18px;font-weight:500}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
    font-size:16px;color:var(--ink);cursor:pointer;font-family:var(--sans);line-height:1.4;transition:border-color .15s,background .15s}
  .opt:active{transform:scale(.995)}
  .opt .key{flex:none;width:26px;height:26px;border-radius:7px;background:var(--paper);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .key{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .key{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt.dim{opacity:.55}
  .opt[disabled]{cursor:default}

  .reveal-btn{margin-top:16px;width:100%;background:var(--bg);border:1.5px solid var(--accent);color:var(--accent);
    border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  .recall-ans{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;display:none}
  .recall-ans.show{display:block}
  .recall-ans .lab2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
  .recall-ans .ans{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:10px}

  .exp{margin-top:16px;background:var(--accent-soft);border-radius:12px;padding:14px 16px;font-size:14.5px;
    color:var(--ink);display:none;line-height:1.55}
  .exp.show{display:block}
  .exp .lab2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
  .src{margin-top:10px;font-size:12px;color:var(--muted)}

  .nav{display:flex;gap:10px;margin-top:18px}
  .nav button{flex:1;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid var(--line)}
  .nav .next{background:var(--accent);color:#fff;border-color:var(--accent)}
  html[data-theme="dark"] .nav .next{color:#06201d}
  .nav .ghost{background:var(--paper);color:var(--muted)}
  .nav button:active{transform:scale(.99)}

  .done{text-align:center;padding:30px 18px}
  .done .score{font-family:var(--serif);font-size:56px;font-weight:600;color:var(--accent);margin:8px 0}
  .done p{color:var(--muted)}
  .hidden{display:none}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="ey">Neuroscience &amp; Behaviour</span>
      <h1>NB Question Bank</h1>
      <span class="sub" id="bankInfo"></span>
    </div>
    <button class="theme-btn" id="themeBtn">Dark</button>
  </header>

  <!-- SETUP -->
  <section id="setup">
    <div class="controls">
      <div class="row"><span class="lab">Mode</span>
        <div class="seg" id="modeSeg">
          <button data-mode="mcq" class="on">Multiple choice</button>
          <button data-mode="recall">Recall</button>
        </div>
      </div>
      <div class="row"><span class="lab">Difficulty</span>
        <button class="chip on" data-diff="all">All</button>
        <button class="chip" data-diff="easy">Easy</button>
        <button class="chip" data-diff="medium">Medium</button>
        <button class="chip" data-diff="hard">Hard</button>
      </div>
      <div class="row"><span class="lab">Lecture</span>
        <select id="lecSel"><option value="all">All lectures</option></select>
      </div>
      <div class="row"><span class="lab">Order</span>
        <div class="seg" id="orderSeg">
          <button data-order="shuffle" class="on">Shuffle</button>
          <button data-order="ordered">In order</button>
        </div>
      </div>
      <button class="start" id="startBtn">Start</button>
    </div>
    <footer>Self-contained study tool &middot; works offline on iPad once loaded</footer>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="meta">
      <span id="counter"></span>
      <span id="scoreLine"></span>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="card" id="card"></div>
    <div class="nav">
      <button class="ghost" id="restartBtn">End</button>
      <button class="next" id="nextBtn">Next</button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="hidden">
    <div class="card done">
      <div class="ey" style="color:var(--accent);font-weight:700;letter-spacing:.2em">Session complete</div>
      <div class="score" id="finalScore">0%</div>
      <p id="finalLine"></p>
      <button class="start" id="againBtn">New session</button>
    </div>
  </section>
</div>

<script>
const QUESTIONS = [
 {
  "q": "A 25-year-old construction worker sustains a blow to the side of his head at the pterion. He has a brief loss of consciousness, a lucid interval, then rapid neurological deterioration. Which vessel is most likely responsible for his deteriorating condition?",
  "opts": [
   "Internal carotid artery within the cavernous sinus",
   "Bridging veins crossing the subdural space",
   "Superior sagittal sinus",
   "Anterior branch of the middle meningeal artery"
  ],
  "correct": 3,
  "exp": "The pterion is the thinnest part of the skull and is grooved internally by the middle meningeal vessels. A fracture here classically ruptures the anterior branch of the middle meningeal artery, causing an epidural (extradural) haematoma with the hallmark lucid interval. Bridging vein tears cause subdural haematomas, which are more common but lack the classic arterial lucid interval pattern. The superior sagittal sinus and internal carotid artery are not related to pterion fractures.",
  "lecture": "01 NB [001] Intracranial cavity 2025-26",
  "topic": "Middle Meningeal Artery & Epidural Haematoma",
  "diff": "medium"
 },
 {
  "q": "During examination of a patient with a scalp infection, pus is found to have spread to produce bilateral periorbital ('black eye') bruising without any direct trauma to the orbits. In which layer of the scalp did the infection most likely accumulate to allow this spread?",
  "opts": [
   "Loose areolar tissue layer",
   "Dense connective tissue layer",
   "Epicranial aponeurosis",
   "Pericranium"
  ],
  "correct": 0,
  "exp": "The loose areolar tissue (layer L of SCALP) is where the scalp is mobile and is termed the 'dangerous area' because fluid, pus, and blood can spread freely within it and extend to the eyelids causing a black eye. Dense connective tissue localises infection. The epicranial aponeurosis does not act as a fluid-collecting space. The pericranium (periosteum) is firmly attached at sutures, so subperiosteal collections do not spread beyond the underlying bone.",
  "lecture": "01 NB [001] Intracranial cavity 2025-26",
  "topic": "Layers of the Scalp",
  "diff": "medium"
 },
 {
  "q": "A patient is found to have thrombosis of the cavernous sinus following spread of a facial infection. Which combination of cranial nerve deficits is most directly explained by the anatomical relationships of structures within and in the lateral wall of the cavernous sinus?",
  "opts": [
   "CN III, CN VI, CN VII, and CN VIII",
   "CN V1, CN V2, CN VI, and CN XII",
   "CN V1, CN V2, CN III, CN IV, and CN VI",
   "CN II, CN III, CN IV, and CN V1"
  ],
  "correct": 2,
  "exp": "The lateral wall of the cavernous sinus contains (from above downward) CN III (oculomotor), CN IV (trochlear), CN V1 (ophthalmic), and CN V2 (maxillary). CN VI and the internal carotid artery pass through the sinus itself, with CN VI lying inferolateral to the artery. Therefore all five nerves (III, IV, V1, V2, VI) are affected by cavernous sinus thrombosis. CN II, VII, VIII, and XII have no relationship to the cavernous sinus.",
  "lecture": "01 NB [001] Intracranial cavity 2025-26",
  "topic": "Cavernous Sinus",
  "diff": "hard"
 },
 {
  "q": "The falx cerebri contains venous sinuses along its borders. Which statement correctly matches a border of the falx cerebri to its enclosed sinus?",
  "opts": [
   "Upper border encloses the superior sagittal sinus; lower free border encloses the inferior sagittal sinus",
   "Base of the falx encloses the inferior sagittal sinus; upper border encloses the straight sinus",
   "Upper border encloses the straight sinus; lower free border encloses the superior sagittal sinus",
   "Upper border encloses the inferior sagittal sinus; lower free border encloses the superior sagittal sinus"
  ],
  "correct": 0,
  "exp": "According to the lecture, the upper (attached) border of the falx cerebri encloses the superior sagittal sinus, the lower free border encloses the inferior sagittal sinus, and the base (posterior attachment) is related to the straight sinus. Options A and C reverse the superior and inferior sagittal sinuses. Option D incorrectly places the inferior sagittal sinus at the base.",
  "lecture": "01 NB [001] Intracranial cavity 2025-26",
  "topic": "Dural Folds and Venous Sinuses",
  "diff": "easy"
 },
 {
  "q": "A 45-year-old man undergoes parotidectomy for a malignant parotid tumor. Two months later he notices redness and sweating over his cheek whenever he eats or even thinks about food. Which of the following best explains this phenomenon?",
  "opts": [
   "Inadvertent section of the lesser petrosal nerve diverting secretomotor impulses to facial skin",
   "Misdirected regeneration of the great auricular nerve supplying the parotid capsule",
   "Damage to the sympathetic plexus around the external carotid artery disrupting vasomotor control",
   "Misdirected regeneration of the auriculotemporal nerve causing parasympathetic fibers to innervate sweat glands"
  ],
  "correct": 3,
  "exp": "Frey's syndrome (gustatory sweating) occurs after lesion of the auriculotemporal nerve, most commonly during parotid surgery. During misdirected regeneration, the parasympathetic (secretomotor) fibers that normally travel in the auriculotemporal nerve to the parotid gland re-grow and innervate the sweat glands of the overlying facial skin, producing sweating and flushing on eating. The great auricular nerve supplies only the capsule (sensory), not secretomotor fibers. Sympathetic damage would impair blood flow/saliva volume but would not produce gustatory sweating. The lesser petrosal nerve is a preganglionic relay, not the structure that directly innervates sweat glands.",
  "lecture": "02 Lecture NB 014 FACEMOUTH III updated 2025-26",
  "topic": "Frey's Syndrome / Nerve Supply of Parotid Gland",
  "diff": "hard"
 },
 {
  "q": "During a parotidectomy, the surgeon must identify structures within the parotid gland in order from most superficial to deepest. Which sequence is correct?",
  "opts": [
   "Retromandibular vein → facial nerve → external carotid artery",
   "External carotid artery → retromandibular vein → facial nerve",
   "Facial nerve → retromandibular vein → external carotid artery",
   "Facial nerve → external carotid artery → retromandibular vein"
  ],
  "correct": 2,
  "exp": "According to the lecture, within the parotid gland the facial nerve is the most superficial structure, the retromandibular vein lies at an intermediate depth, and the external carotid artery is the deepest structure. This is clinically important because tumors or cysts within the parotid gland are difficult to remove without risking damage to these structures, particularly the facial nerve. Options B, C, and D transpose the positions of one or more of these structures incorrectly.",
  "lecture": "02 Lecture NB 014 FACEMOUTH III updated 2025-26",
  "topic": "Structures Inside the Parotid Gland",
  "diff": "medium"
 },
 {
  "q": "The lingual nerve has a distinctive triple relationship with the submandibular duct. Tracing the lingual nerve from posterior to anterior, which sequence correctly describes this relationship?",
  "opts": [
   "First inferior, then lateral, then medial to the duct",
   "First lateral, then medial, then inferior to the duct",
   "First lateral, then inferior, then medial to the duct",
   "First medial, then inferior, then lateral to the duct"
  ],
  "correct": 2,
  "exp": "The lecture explicitly states the triple relation of the lingual nerve to the submandibular duct proceeds in the order: (1) lateral to the duct, (2) then inferior to the duct, (3) finally medial to the duct as it passes from posterior to anterior. This winding course is clinically significant during submandibular gland surgery, as the lingual nerve can be inadvertently damaged. The other options present the steps in incorrect orders.",
  "lecture": "02 Lecture NB 014 FACEMOUTH III updated 2025-26",
  "topic": "Submandibular Gland - Triple Relation of Lingual Nerve",
  "diff": "medium"
 },
 {
  "q": "The internal carotid artery (ICA) terminates opposite the anterior perforated substance by dividing into two named arteries. Which of the following correctly identifies these two terminal branches?",
  "opts": [
   "Anterior choroidal artery and middle cerebral artery",
   "Anterior cerebral artery and posterior communicating artery",
   "Anterior cerebral artery and middle cerebral artery",
   "Middle cerebral artery and ophthalmic artery"
  ],
  "correct": 2,
  "exp": "The lecture explicitly states that the ICA ends opposite the anterior perforated substance by dividing into the anterior cerebral artery (ACA) and middle cerebral artery (MCA). The posterior communicating artery, ophthalmic artery, and anterior choroidal artery are branches of the cerebral part of the ICA, not its terminal division. The ophthalmic artery is the first branch and arises earlier; the posterior communicating and anterior choroidal arteries are named branches, not the terminal bifurcation.",
  "lecture": "02 NB [026] [027] Lab Blood supply of brain horizontal section 25-26",
  "topic": "Internal Carotid Artery – terminal branches",
  "diff": "medium"
 },
 {
  "q": "A 58-year-old man develops sudden contralateral hemiplegia following rupture of a branch of the middle cerebral artery (MCA). Which specific branch is classically responsible for this clinical picture and why?",
  "opts": [
   "The cortical branches of the MCA supplying the motor strip, causing direct cortical injury",
   "The striate artery of cerebral haemorrhage, because it ruptures causing pressure on motor fibres in the internal capsule",
   "The lenticulostriate arteries supplying the caudate nucleus, causing basal ganglia infarction",
   "The anterior choroidal artery, because it supplies the posterior limb of the internal capsule"
  ],
  "correct": 1,
  "exp": "The lecture describes that one large central (striate) branch of the MCA is called the 'artery of cerebral haemorrhage,' which frequently ruptures causing haemorrhage inside the cerebral hemisphere and pressure on motor fibres in the internal capsule, producing contralateral hemiplegia. The anterior choroidal artery is a branch of the ICA, not the MCA. Caudate nucleus infarction does not classically produce hemiplegia. Cortical branch occlusion produces focal cortical deficits rather than the massive haemorrhagic hemiplegia described.",
  "lecture": "02 NB [026] [027] Lab Blood supply of brain horizontal section 25-26",
  "topic": "Middle Cerebral Artery – applied anatomy",
  "diff": "hard"
 },
 {
  "q": "Occlusion of the posterior inferior cerebellar artery (PICA) produces the lateral medullary syndrome. Which combination of deficits best characterises this syndrome according to the lecture?",
  "opts": [
   "Ipsilateral cerebellar ataxia, contralateral loss of proprioception from the body, and ipsilateral tongue hemiatrophy",
   "Contralateral homonymous hemianopia with macular sparing and ipsilateral Horner syndrome",
   "Contralateral hemiplegia, contralateral loss of fine touch, and ipsilateral tongue paralysis",
   "Ipsilateral cerebellar ataxia, ipsilateral loss of pain and temperature from the face, and contralateral loss of pain and temperature from the body"
  ],
  "correct": 3,
  "exp": "The lecture lists the features of lateral medullary (PICA) syndrome as: cerebellar ataxia (spinocerebellar tract and ICP), ipsilateral facial loss of pain and temperature (spinal nucleus and tract of V), contralateral body loss of pain and temperature (spinal lemniscus), ipsilateral palate/pharynx/larynx paralysis (nucleus ambiguus), loss of taste (nucleus solitarius), and ipsilateral Horner syndrome. Option A describes medial medullary syndrome (anterior spinal artery occlusion). Option C mixes PCA territory features with Horner syndrome. Option D incorrectly substitutes contralateral proprioception loss and tongue hemiatrophy, which are features of medial medullary syndrome.",
  "lecture": "02 NB [026] [027] Lab Blood supply of brain horizontal section 25-26",
  "topic": "Lateral Medullary Syndrome – PICA occlusion",
  "diff": "hard"
 },
 {
  "q": "The posterior cerebral artery (PCA) supplies the visual cortex, and its occlusion leads to homonymous hemianopia with macular sparing. What is the lecture's stated reason for this macular sparing?",
  "opts": [
   "The branches supplying the macular region have strong anastomoses with the middle cerebral artery (MCA)",
   "The posterior communicating artery directly perfuses the macular area via collateral flow",
   "The macula is bilaterally represented in both occipital lobes, so one PCA occlusion cannot affect it",
   "The anterior choroidal artery provides an independent supply to the macular cortex"
  ],
  "correct": 0,
  "exp": "The lecture explicitly states that macular sparing occurs because the branches supplying the macular region have strong anastomosis with the MCA, preserving perfusion to that area even when the PCA is occluded. Bilateral cortical representation (option A) is not given as the reason in this lecture. The anterior choroidal artery (option C) and posterior communicating artery (option D) are not cited as contributors to macular sparing.",
  "lecture": "02 NB [026] [027] Lab Blood supply of brain horizontal section 25-26",
  "topic": "Posterior Cerebral Artery – applied anatomy and macular sparing",
  "diff": "medium"
 },
 {
  "q": "A surgeon performing lymph node biopsy in the posterior triangle of the neck must be cautious to avoid injuring a nerve related to the roof of that triangle. Which nerve is most at risk?",
  "opts": [
   "Hypoglossal nerve (CN XII)",
   "Glossopharyngeal nerve (CN IX)",
   "Spinal accessory nerve (CN XI)",
   "Vagus nerve (CN X)"
  ],
  "correct": 2,
  "exp": "The spinal accessory nerve (CN XI) is specifically described as related to the roof of the posterior triangle and is highlighted as having clinical importance because it must be avoided during surgical removal of lymph nodes in that region. The vagus, hypoglossal, and glossopharyngeal nerves travel within or near the carotid sheath, not the roof of the posterior triangle.",
  "lecture": "03 NB [009] LGW Superficial (neurovascular) structures of the neck TRIANGLES 25-26",
  "topic": "Posterior Triangle and Cranial Nerves",
  "diff": "medium"
 },
 {
  "q": "The common carotid artery bifurcates into internal and external carotid arteries at which anatomical landmark?",
  "opts": [
   "Lower border of the thyroid cartilage",
   "Upper border of the thyroid cartilage",
   "Level of the hyoid bone",
   "Level of the cricoid cartilage"
  ],
  "correct": 1,
  "exp": "According to the lecture, the common carotid artery bifurcates at the level of the upper border of the thyroid cartilage. The hyoid bone is specifically the level at which the lingual artery arises from the external carotid, not the bifurcation point. The cricoid cartilage and lower border of the thyroid cartilage are not mentioned as the bifurcation level.",
  "lecture": "03 NB [009] LGW Superficial (neurovascular) structures of the neck TRIANGLES 25-26",
  "topic": "Common Carotid Artery",
  "diff": "easy"
 },
 {
  "q": "A patient requires long-term central venous access. Based on the lecture, which vessel is the most suitable site and what is its main associated risk?",
  "opts": [
   "Right internal jugular vein; risk of infection",
   "Subclavian vein; risk of superior vena cava thrombosis",
   "Left internal jugular vein; risk of pneumothorax",
   "Subclavian vein; risk of pneumothorax and arterial or nerve injury"
  ],
  "correct": 3,
  "exp": "The lecture states that the subclavian vein is the best suitable site for long-term central line placement due to lower infection risk, but it may cause pneumothorax and arterial or nerve injury. The right IJV is preferred for short-term diagnostic or therapeutic catheterisation because it is larger and straighter, not specifically for long-term access.",
  "lecture": "03 NB [009] LGW Superficial (neurovascular) structures of the neck TRIANGLES 25-26",
  "topic": "Venous Access and Jugular/Subclavian Veins",
  "diff": "medium"
 },
 {
  "q": "Which of the following correctly describes the contents of the carotid sheath?",
  "opts": [
   "Common carotid artery, subclavian vein, and cranial nerves IX, X, XI, XII",
   "Common carotid artery, internal jugular vein, and cranial nerves IX, X, XI, XII",
   "Common and internal carotid arteries, external jugular vein, and cranial nerves IX, X, XI, XII",
   "Common and external carotid arteries, internal jugular vein, and cranial nerves X and XII only"

const $ = s => document.querySelector(s);
let mode="mcq", diff="all", order="shuffle", lecture="all";
let pool=[], idx=0, score=0, answered=false;

// populate lectures + bank info
(function init(){
  const lectures = Array.from(new Set(QUESTIONS.map(q=>q.lecture))).sort((a,b)=>a.localeCompare(b));
  const sel = $("#lecSel");
  lectures.forEach(l=>{
    const o=document.createElement("option");
    o.value=l; o.textContent = l.length>70 ? l.slice(0,68)+"\u2026" : l;
    sel.appendChild(o);
  });
  $("#bankInfo").textContent = QUESTIONS.length + " questions \u00b7 " + lectures.length + " lectures";
})();

// theme
(function(){
  const root=document.documentElement, btn=$("#themeBtn");
  btn.addEventListener("click",()=>{
    const dark = root.getAttribute("data-theme")==="dark";
    root.setAttribute("data-theme", dark?"light":"dark");
    btn.textContent = dark?"Dark":"Light";
  });
})();

// segmented + chips
$("#modeSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  mode=b.dataset.mode;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));});
$("#orderSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  order=b.dataset.order;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));});
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
  diff=c.dataset.diff;document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));}));
$("#lecSel").addEventListener("change",e=>lecture=e.target.value);

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(){
  let p = QUESTIONS.filter(q=>(diff==="all"||q.diff===diff)&&(lecture==="all"||q.lecture===lecture));
  p = p.map(q=>({...q}));
  return order==="shuffle"?shuffle(p):p;
}

$("#startBtn").addEventListener("click",start);
$("#againBtn").addEventListener("click",()=>{show("setup");});
$("#restartBtn").addEventListener("click",finish);
$("#nextBtn").addEventListener("click",next);

function start(){
  pool=buildPool();
  if(pool.length===0){alert("No questions match those filters. Try widening them.");return;}
  idx=0;score=0;show("quiz");render();
}
function show(id){["setup","quiz","done"].forEach(s=>$("#"+s).classList.toggle("hidden",s!==id));}

function render(){
  answered=false;
  const q=pool[idx];
  $("#counter").textContent = "Question "+(idx+1)+" of "+pool.length;
  $("#scoreLine").textContent = mode==="mcq" ? ("Score "+score+"/"+idx) : "";
  $("#prog").style.width = ((idx)/pool.length*100)+"%";
  $("#nextBtn").textContent = idx===pool.length-1 ? "Finish" : "Next";

  const dc = "d-"+(["easy","medium","hard"].includes(q.diff)?q.diff:"medium");
  let h = '<div class="tagline">'
        + '<span class="tag '+dc+'">'+q.diff+'</span>'
        + (q.topic?'<span class="tag">'+esc(q.topic)+'</span>':'')
        + '</div>'
        + '<p class="qtext">'+esc(q.q)+'</p>';

  if(mode==="mcq"){
    h += '<div class="opts">';
    q.opts.forEach((o,i)=>{ h += '<button class="opt" data-i="'+i+'"><span class="key">'+"ABCD"[i]+'</span><span>'+esc(o)+'</span></button>'; });
    h += '</div>';
    h += '<div class="exp" id="exp"><div class="lab2">Explanation</div><span>'+esc(q.exp)+'</span><div class="src">From: '+esc(q.lecture)+'</div></div>';
  } else {
    h += '<button class="reveal-btn" id="revealBtn">Reveal answer</button>';
    h += '<div class="recall-ans" id="recallAns"><div class="lab2">Answer</div>'
       + '<div class="ans">'+esc(q.opts[q.correct])+'</div>'
       + '<div class="exp show" style="margin-top:0"><div class="lab2">Why</div><span>'+esc(q.exp)+'</span>'
       + '<div class="src">From: '+esc(q.lecture)+'</div></div></div>';
  }
  $("#card").innerHTML=h;

  if(mode==="mcq"){
    $("#card").querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click",()=>choose(btn,q)));
  } else {
    $("#revealBtn").addEventListener("click",()=>{
      $("#recallAns").classList.add("show");
      $("#revealBtn").style.display="none";
    });
  }
}

function choose(btn,q){
  if(answered)return; answered=true;
  const chosen=+btn.dataset.i;
  const opts=$("#card").querySelectorAll(".opt");
  opts.forEach((b,i)=>{
    b.setAttribute("disabled","");
    if(i===q.correct)b.classList.add("correct");
    else if(i===chosen)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(chosen===q.correct)score++;
  $("#exp").classList.add("show");
  $("#scoreLine").textContent = "Score "+score+"/"+(idx+1);
}

function next(){
  if(idx>=pool.length-1){finish();return;}
  idx++;render();
}
function finish(){
  const total = mode==="mcq" ? (answered?idx+1:idx) : pool.length;
  show("done");
  if(mode==="mcq"){
    const denom = answered?idx+1:idx;
    const pct = denom>0?Math.round(score/denom*100):0;
    $("#finalScore").textContent = pct+"%";
    $("#finalLine").textContent = score+" correct out of "+denom+" answered.";
  } else {
    $("#finalScore").textContent = pool.length;
    $("#finalLine").textContent = "questions reviewed in recall mode.";
  }
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
</body>
</html>
