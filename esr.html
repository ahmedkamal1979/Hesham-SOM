<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESR Module — Question Bank</title>
<style>
  :root{
    --bg:#f4f1ea; --paper:#fffdf8; --ink:#1f2a2e; --muted:#5d6b6f;
    --line:#e3ddd0; --accent:#0f766e; --accent-soft:#d7eae6;
    --correct:#15803d; --correct-bg:#e6f4ea; --wrong:#b91c1c; --wrong-bg:#fbeaea;
    --shadow:0 1px 2px rgba(31,42,46,.06),0 8px 24px rgba(31,42,46,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#10171a; --paper:#172226; --ink:#e8eeec; --muted:#92a3a6;
    --line:#243034; --accent:#5eead4; --accent-soft:#13312e;
    --correct:#4ade80; --correct-bg:#10291a; --wrong:#f87171; --wrong-bg:#2a1414;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    line-height:1.55; -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 18px 80px}
  header{padding:14px 0 10px;border-bottom:1px solid var(--line);margin-bottom:18px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand .ey{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .brand h1{font-family:var(--serif);font-size:30px;font-weight:600;margin:0;letter-spacing:-.01em}
  .brand .sub{font-size:13px;color:var(--muted)}
  .theme-btn{background:var(--paper);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--sans)}
  .theme-btn:active{transform:scale(.97)}

  .controls{background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:16px;box-shadow:var(--shadow);margin-bottom:18px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .row + .row{margin-top:12px}
  .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    width:100%;margin-bottom:2px;font-weight:700}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted);padding:8px 16px;border-radius:999px;
    font-size:14px;cursor:pointer;font-family:var(--sans);font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  html[data-theme="dark"] .seg button.on{color:#06201d}
  .chip{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
  .chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  select{appearance:none;-webkit-appearance:none;background:var(--bg);border:1px solid var(--line);
    color:var(--ink);border-radius:12px;padding:10px 14px;font-size:14px;font-family:var(--sans);
    width:100%;max-width:100%}
  .start{margin-top:14px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  html[data-theme="dark"] .start{color:#06201d}
  .start:active{transform:scale(.99)}

  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--muted)}
  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:16px}
  .bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s ease}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow)}
  .tagline{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tag{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-weight:700}
  .tag.d-easy{color:var(--correct);border-color:var(--correct)}
  .tag.d-medium{color:var(--accent);border-color:var(--accent)}
  .tag.d-hard{color:var(--wrong);border-color:var(--wrong)}
  .qtext{font-family:var(--serif);font-size:21px;line-height:1.45;margin:0 0 18px;font-weight:500}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
    font-size:16px;color:var(--ink);cursor:pointer;font-family:var(--sans);line-height:1.4;transition:border-color .15s,background .15s}
  .opt:active{transform:scale(.995)}
  .opt .key{flex:none;width:26px;height:26px;border-radius:7px;background:var(--paper);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .key{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .key{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt.dim{opacity:.55}
  .opt[disabled]{cursor:default}

  .reveal-btn{margin-top:16px;width:100%;background:var(--bg);border:1.5px solid var(--accent);color:var(--accent);
    border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  .recall-ans{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;display:none}
  .recall-ans.show{display:block}
  .recall-ans .lab2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
  .recall-ans .ans{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:10px}

  .exp{margin-top:16px;background:var(--accent-soft);border-radius:12px;padding:14px 16px;font-size:14.5px;
    color:var(--ink);display:none;line-height:1.55}
  .exp.show{display:block}
  .exp .lab2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
  .src{margin-top:10px;font-size:12px;color:var(--muted)}

  .nav{display:flex;gap:10px;margin-top:18px}
  .nav button{flex:1;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid var(--line)}
  .nav .next{background:var(--accent);color:#fff;border-color:var(--accent)}
  html[data-theme="dark"] .nav .next{color:#06201d}
  .nav .ghost{background:var(--paper);color:var(--muted)}
  .nav button:active{transform:scale(.99)}

  .done{text-align:center;padding:30px 18px}
  .done .score{font-family:var(--serif);font-size:56px;font-weight:600;color:var(--accent);margin:8px 0}
  .done p{color:var(--muted)}
  .hidden{display:none}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="ey">Endocrine System &amp; Reproduction</span>
      <h1>ESR Question Bank</h1>
      <span class="sub" id="bankInfo"></span>
    </div>
    <button class="theme-btn" id="themeBtn">Dark</button>
  </header>

  <!-- SETUP -->
  <section id="setup">
    <div class="controls">
      <div class="row"><span class="lab">Mode</span>
        <div class="seg" id="modeSeg">
          <button data-mode="mcq" class="on">Multiple choice</button>
          <button data-mode="recall">Recall</button>
        </div>
      </div>
      <div class="row"><span class="lab">Difficulty</span>
        <button class="chip on" data-diff="all">All</button>
        <button class="chip" data-diff="easy">Easy</button>
        <button class="chip" data-diff="medium">Medium</button>
        <button class="chip" data-diff="hard">Hard</button>
      </div>
      <div class="row"><span class="lab">Lecture</span>
        <select id="lecSel"><option value="all">All lectures</option></select>
      </div>
      <div class="row"><span class="lab">Order</span>
        <div class="seg" id="orderSeg">
          <button data-order="shuffle" class="on">Shuffle</button>
          <button data-order="ordered">In order</button>
        </div>
      </div>
      <button class="start" id="startBtn">Start</button>
    </div>
    <footer>Self-contained study tool &middot; works offline on iPad once loaded</footer>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="meta">
      <span id="counter"></span>
      <span id="scoreLine"></span>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="card" id="card"></div>
    <div class="nav">
      <button class="ghost" id="restartBtn">End</button>
      <button class="next" id="nextBtn">Next</button>
    </div>
  </section>

  <!-- DONE -->
  <section id="done" class="hidden">
    <div class="card done">
      <div class="ey" style="color:var(--accent);font-weight:700;letter-spacing:.2em">Session complete</div>
      <div class="score" id="finalScore">0%</div>
      <p id="finalLine"></p>
      <button class="start" id="againBtn">New session</button>
    </div>
  </section>
</div>

<script>
const QUESTIONS = [
 {
  "q": "The rate-limiting step in adrenal steroidogenesis is the conversion of cholesterol to pregnenolone. Which of the following best describes the enzyme responsible and its cofactor requirements?",
  "opts": [
   "P450c17 located in the inner mitochondrial membrane, requiring NADPH and molecular O2",
   "P450scc located in the inner mitochondrial membrane, requiring NADPH and molecular O2",
   "StAR protein located in the outer mitochondrial membrane, requiring NAD+ and molecular O2",
   "3β-hydroxysteroid dehydrogenase located in the endoplasmic reticulum, requiring NADPH and molecular O2"
  ],
  "correct": 1,
  "exp": "Cytochrome P450scc (P450scc) is located in the inner mitochondrial membrane and catalyses three distinct reactions—20α-hydroxylation, 22-hydroxylation, and side-chain scission—to yield pregnenolone and isocaproic acid; it requires molecular O2 and NADPH. The StAR protein choice is incorrect because StAR is a transporter that moves cholesterol across the aqueous space between mitochondrial membranes, not an enzyme that converts cholesterol to pregnenolone, and it is not described as being on the outer membrane in this functional enzymatic role. 3β-hydroxysteroid dehydrogenase catalyses the conversion of the C3-OH to C=O and isomerization of the double bond, not the initial cleavage step. P450c17 catalyses 17α-hydroxylation and 17,20-lyase reactions in the zona fasciculata and reticularis, not the rate-limiting cholesterol side-chain cleavage.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "Steroidogenesis – rate-limiting step",
  "diff": "medium"
 },
 {
  "q": "A deficiency of 21-hydroxylase (P450c21) causes approximately 95% of all cases of congenital adrenal hyperplasia (CAH). Which pair of steroid hormones would be most directly reduced as a result of this enzyme deficiency?",
  "opts": [
   "DHEA and androstenedione",
   "Corticosterone and testosterone",
   "Pregnenolone and progesterone",
   "Cortisol and aldosterone"
  ],
  "correct": 3,
  "exp": "P450c21 catalyses 21-hydroxylation in the biosynthesis of both mineralocorticoids and glucocorticoids; specifically it converts progesterone to deoxycorticosterone (DOC) in the mineralocorticoid pathway and 17α-hydroxyprogesterone to 11-deoxycortisol in the glucocorticoid pathway. Loss of this enzyme therefore directly reduces cortisol (glucocorticoid) and aldosterone (mineralocorticoid). DHEA and androstenedione are adrenal androgens synthesised via P450c17, which is unaffected by a 21-hydroxylase deficiency; indeed, precursors accumulate and androgen production actually increases. Corticosterone requires P450c11β1/β2 downstream of P450c21, so it is reduced, but testosterone is primarily a gonadal product not a direct adrenal product in this pathway. Pregnenolone and progesterone are upstream of P450c21 and would accumulate, not decrease.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "Congenital adrenal hyperplasia – enzyme deficiency",
  "diff": "medium"
 },
 {
  "q": "P450c11β1 and P450c11β2 are closely related enzymes that catalyse the final steps in corticosteroid synthesis. Which statement best distinguishes their unique functional difference?",
  "opts": [
   "Both enzymes can convert DOC to corticosterone, but only P450c11β2 can synthesise aldosterone",
   "Only P450c11β1 can synthesise aldosterone because it is restricted to the zona glomerulosa",
   "P450c11β1 is induced by potassium and angiotensin, whereas P450c11β2 is induced by ACTH via cAMP",
   "P450c11β2 converts 11-deoxycortisol to cortisol, whereas P450c11β1 converts DOC to aldosterone"
  ],
  "correct": 0,
  "exp": "Both P450c11β1 and P450c11β2 possess 11β-hydroxylase activity and can convert DOC to corticosterone. However, only P450c11β2 (aldosterone synthase), which is found exclusively in the zona glomerulosa, has additional 18-hydroxylase and aldehyde synthase activities needed to complete aldosterone synthesis. Saying only P450c11β1 can synthesise aldosterone is the reverse of reality. Stating that P450c11β2 converts 11-deoxycortisol to cortisol is incorrect—this is the role of P450c11β1, the classical 11β-hydroxylase. The regulatory statement in the fourth option is reversed: CYP11B2 (encoding P450c11β2) is induced by potassium and angiotensin II, while CYP11B1 (encoding P450c11β1) is induced by ACTH via cAMP and suppressed by glucocorticoids.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "P450c11β1 vs P450c11β2 – aldosterone synthesis",
  "diff": "hard"
 },
 {
  "q": "A patient with a pituitary tumour secreting excess ACTH presents with hyperglycaemia, central obesity, and easy bruising. Which mechanism most directly explains the hyperglycaemia observed in this condition?",
  "opts": [
   "Cortisol increases insulin secretion from the pancreas, promoting hepatic glucose uptake",
   "Cortisol inhibits aldosterone secretion, causing sodium retention that dilutes plasma glucose",
   "Cortisol activates glucocorticoid receptors that increase expression of gluconeogenic enzymes including PEPCK, glucose-6-phosphatase, and fructose-1,6-bisphosphatase in the liver",
   "Excess ACTH directly stimulates hepatic glycogen phosphorylase independent of cortisol"
  ],
  "correct": 2,
  "exp": "Cortisol binds the glucocorticoid receptor (GR), and the activated GR increases expression of key gluconeogenic enzymes—PEPCK (OAA to PEP), glucose-6-phosphatase, and fructose-1,6-bisphosphatase—in the liver, raising plasma glucose. Additionally, cortisol inhibits insulin-mediated glucose uptake via GLUT4 and promotes protein catabolism and lipolysis to provide gluconeogenic substrates. Claiming ACTH directly stimulates hepatic glycogen phosphorylase independent of cortisol is not supported by the lecture; ACTH acts by stimulating adrenal cortisol production. Cortisol does not inhibit aldosterone to cause a sodium dilution effect that explains hyperglycaemia. Cortisol causes insulin resistance and hyperglycaemia, not increased insulin secretion promoting glucose uptake.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "Metabolic actions of cortisol – hyperglycaemia",
  "diff": "medium"
 },
 {
  "q": "Regarding the significance of adrenal androgens in women, which of the following statements is most accurate according to the lecture?",
  "opts": [
   "Adrenal androgens in women act primarily by directly binding androgen receptors to stimulate uterine growth",
   "Adrenal androgens are irrelevant in women because DHEA constitutes only 2% of total plasma androgen",
   "Approximately 50% of female oestrogen is derived from adrenal androgens, making them important substrates especially after the menopause",
   "DHEA is the most potent adrenal androgen in women and does not require peripheral conversion to oestrogen"
  ],
  "correct": 2,
  "exp": "The lecture explicitly states that about 50% of female oestrogen is derived from adrenal androgens via peripheral aromatization, and that aromatase inhibitors are used in postmenopausal oestrogen-dependent breast cancer precisely because of this route. The 2% figure applies to DHEA in the context of explaining why adrenal androgens are swamped by testosterone in healthy males, not why they are irrelevant in women. The lecture does not describe adrenal androgens directly stimulating uterine growth via androgen receptors; their importance in women relates to adrenarche, postmenopausal oestrogen supply, and oestrogen-dependent tumours. DHEA is described as a 'weak' 5,17-ketosteroid that requires conversion; it is not characterised as the most potent adrenal androgen acting independently of peripheral conversion.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "Adrenal androgens – significance in women",
  "diff": "medium"
 },
 {
  "q": "A patient presenting with hyponatraemia, hyperkalaemia, hypotension, polyuria, and hyperpigmentation of skin creases and the mouth is most likely suffering from which condition, and what is the primary biochemical basis of hyperpigmentation in this case?",
  "opts": [
   "Primary hyperaldosteronism; excess aldosterone cross-reacts with glucocorticoid receptors to stimulate melanocytes",
   "Congenital adrenal hyperplasia; excess 21-hydroxylase activity raises DHEA, which stimulates melanin synthesis",
   "Cushing's disease; excess cortisol directly stimulates melanocytes via glucocorticoid receptors",
   "Addison's disease; loss of negative feedback on the pituitary increases POMC-derived ACTH and α-MSH, stimulating melanin production"
  ],
  "correct": 3,
  "exp": "The clinical picture—hyponatraemia, hyperkalaemia, hypotension, polyuria, and hyperpigmentation—is classic for Addison's disease (primary adrenal insufficiency with decreased cortisol). Hyperpigmentation arises because loss of cortisol removes negative feedback on the hypothalamic-pituitary axis, causing excess POMC processing; POMC yields both ACTH and α-MSH (from the intermediate pituitary lobe), and α-MSH stimulates melanin production. Cushing's disease involves excess cortisol, producing hyperglycaemia, central obesity, and hypertension—not hyponatraemia or hyperpigmentation. Primary hyperaldosteronism (Conn's syndrome) presents with hypertension and hypokalaemia due to excess aldosterone, not the electrolyte pattern or pigmentation described. CAH due to 21-hydroxylase deficiency reduces, not increases, 21-hydroxylase activity and does not directly cause hyperpigmentation through DHEA.",
  "lecture": "029 normal adrenal axis Modified-25-26",
  "topic": "Adrenal insufficiency – Addison's disease and POMC-derived hyperpigmentation",
  "diff": "hard"
 },
 {
  "q": "A 10-year-old boy from a consanguineous family presents with hypertension, hypokalemia, and muscle weakness. Laboratory results show suppressed plasma renin and LOW plasma aldosterone. Which mechanism best explains this biochemical picture?",
  "opts": [
   "Loss-of-function mutation in 11β-HSD Type 2 allowing cortisol to activate the mineralocorticoid receptor",
   "Gain-of-function mutation in the mineralocorticoid receptor increasing its affinity for cortisone",
   "Overexpression of 11β-HSD Type 1 in renal collecting duct cells generating excess active glucocorticoid",
   "Excess aldosterone secretion overwhelming the mineralocorticoid receptor"
  ],
  "correct": 0,
  "exp": "The hallmark of Apparent Mineralocorticoid Excess (AME) is hyperaldosteronism-like features (hypertension, hypokalemia, anti-natriuresis) with LOW plasma aldosterone and suppressed renin, because cortisol—present at 100–1000 times the concentration of aldosterone—gains inappropriate access to the mineralocorticoid receptor (MR). This occurs when 11β-HSD Type 2, the 'guardian of the MR,' fails due to a loss-of-function mutation (autosomal recessive, hence common in consanguineous families); it can no longer oxidise cortisol to the inactive cortisone, so cortisol occupies and activates the MR. Excess aldosterone secretion is excluded by the low measured aldosterone level. Overexpression of 11β-HSD Type 1 occurs in liver/fat/brain and generates active glucocorticoid, but this enzyme is not the guardian in mineralocorticoid-selective tissues and its overexpression does not cause the described suppressed-renin picture. A gain-of-function MR mutation would not be explained by the absent guardian mechanism, and cortisone itself has greatly reduced activity at the MR, so increased receptor affinity for cortisone is not the issue.",
  "lecture": "034 Apparent mineralocorticoid excess 2025-26",
  "topic": "Apparent Mineralocorticoid Excess – pathophysiology",
  "diff": "medium"
 },
 {
  "q": "A patient who has been consuming large quantities of liquorice-containing herbal remedies develops hypertension with hypokalemia. Which of the following best explains the biochemical basis of these findings?",
  "opts": [
   "Glycyrrhetinic acid inhibits the renin-angiotensin system, causing sodium retention independent of the MR",
   "Glycyrrhetinic acid activates 11β-HSD Type 1, generating excess active cortisol in the liver",
   "Glycyrrhetinic acid binds and directly activates the mineralocorticoid receptor, mimicking aldosterone",
   "Glycyrrhetinic acid inhibits 11β-HSD Type 2, preventing oxidation of cortisol to cortisone in mineralocorticoid-selective tissues"
  ],
  "correct": 3,
  "exp": "Glycyrrhetinic acid (the active component of liquorice) is an inhibitor of 11β-HSD Type 2. This enzyme normally oxidises cortisol to the inactive cortisone in aldosterone-selective tissues (kidney collecting ducts, colon, salivary glands, placenta), thereby protecting the mineralocorticoid receptor from the far more abundant cortisol. When the enzyme is inhibited, cortisol accumulates in these tissues and activates the MR, producing sodium retention, fluid overload, hypertension, and kaliuresis. Activation of 11β-HSD Type 1 in the liver would increase glucocorticoid activity at the GR or MR systemically but is not the mechanism of liquorice toxicity. Glycyrrhetinic acid does not directly bind the MR. While renin is suppressed as a consequence of volume expansion, the primary mechanism is enzyme inhibition, not direct renin suppression.",
  "lecture": "034 Apparent mineralocorticoid excess 2025-26",
  "topic": "Inhibitors of 11β-HSD Type 2",
  "diff": "medium"
 },
 {
  "q": "A researcher compares the properties of 11β-HSD Type 1 and 11β-HSD Type 2. Which statement correctly distinguishes the two enzymes based on their tissue distribution, cofactor use, and primary direction of catalysis?",
  "opts": [
   "Type 2 uses NADPH as cofactor, acts mainly as a reductase, and is expressed ubiquitously including in the liver",
   "Type 1 uses NADPH as cofactor, acts mainly as a reductase, and is expressed ubiquitously including in the liver",
   "Type 1 uses NAD⁺ as cofactor, acts mainly as a dehydrogenase, and is expressed selectively in kidney and colon",
   "Type 2 uses NADPH as cofactor, acts mainly as a dehydrogenase, and is expressed in aldosterone-selective tissues"
  ],
  "correct": 1,
  "exp": "According to the lecture table, 11β-HSD Type 1 is ubiquitously expressed (including liver, lung, fat, gonads, brain, and pituitary), uses NADPH as its cofactor, and acts predominantly as a reductase—converting inactive cortisone back to active cortisol, thereby generating glucocorticoid active at the MR. 11β-HSD Type 2 is restricted to aldosterone-selective tissues (kidney, colon, parotid gland, placenta), uses NAD⁺ as its cofactor, and acts as a dehydrogenase, rendering glucocorticoids inactive at the MR. The option stating Type 1 uses NAD⁺ and is a dehydrogenase in kidney/colon reverses both the cofactor and tissue distribution. The option attributing NADPH and reductase activity to Type 2 and ubiquitous distribution inverts the two isoforms entirely. The option correctly attributing NADPH and dehydrogenase to Type 2 gets the cofactor of Type 2 wrong (it should be NAD⁺) and misassigns tissue distribution.",
  "lecture": "034 Apparent mineralocorticoid excess 2025-26",
  "topic": "Comparison of 11β-HSD Type 1 vs Type 2",
  "diff": "hard"
 },
 {
  "q": "A 10-year-old child from a consanguineous family presents with hypertension, hypokalemia, and muscle weakness. Laboratory results show suppressed plasma renin and low plasma aldosterone. Which mechanism best explains this clinical picture?",
  "opts": [
   "Loss-of-function mutation in 11β-HSD Type 2 allowing cortisol to occupy and activate the mineralocorticoid receptor",
   "Excess aldosterone secretion from the adrenal cortex overwhelming 11β-HSD Type 2 capacity",
   "Gain-of-function mutation in the mineralocorticoid receptor increasing its affinity for aldosterone",
   "Overexpression of 11β-HSD Type 1 in the kidney generating excess active glucocorticoid at the mineralocorticoid receptor"
  ],
  "correct": 0,
  "exp": "The hallmark of Apparent Mineralocorticoid Excess is hyperaldosteronism-like features (hypertension, hypokalemia, anti-natriuresis) in the presence of LOW plasma aldosterone and suppressed renin, because cortisol rather than aldosterone is driving the mineralocorticoid receptor. This occurs when the guardian enzyme 11β-HSD Type 2 fails—through a loss-of-function mutation (typically autosomal recessive, hence the consanguineous family history)—and can no longer oxidise cortisol to inactive cortisone in aldosterone-selective tissues. Overexpression of 11β-HSD Type 1 would re-activate glucocorticoids but is associated with metabolic syndrome and apparent glucocorticoid excess, not the aldosterone-deficient pattern described. A gain-of-function mutation in the mineralocorticoid receptor would not explain why plasma aldosterone is low, since aldosterone production would still be driven by the renin-angiotensin system. Excess aldosterone secretion would raise, not lower, plasma aldosterone levels.",
  "lecture": "034 Apparent mineralocorticoid excess 25-26",
  "topic": "Apparent Mineralocorticoid Excess – Pathophysiology",
  "diff": "medium"
 },
 {
  "q": "Under normal physiological conditions, mineralocorticoid-selective tissues (kidney collecting duct, colon, salivary glands) respond specifically to aldosterone despite plasma cortisol concentrations being 100–1000 times higher than aldosterone. Which property of the 11β-HSD Type 2 enzyme is directly responsible for this selectivity?",
  "opts": [
   "It is expressed ubiquitously including in the liver and renders cortisol inactive before it reaches the kidney",

const $ = s => document.querySelector(s);
let mode="mcq", diff="all", order="shuffle", lecture="all";
let pool=[], idx=0, score=0, answered=false;

// populate lectures + bank info
(function init(){
  const lectures = Array.from(new Set(QUESTIONS.map(q=>q.lecture))).sort((a,b)=>a.localeCompare(b));
  const sel = $("#lecSel");
  lectures.forEach(l=>{
    const o=document.createElement("option");
    o.value=l; o.textContent = l.length>70 ? l.slice(0,68)+"\u2026" : l;
    sel.appendChild(o);
  });
  $("#bankInfo").textContent = QUESTIONS.length + " questions \u00b7 " + lectures.length + " lectures";
})();

// theme
(function(){
  const root=document.documentElement, btn=$("#themeBtn");
  btn.addEventListener("click",()=>{
    const dark = root.getAttribute("data-theme")==="dark";
    root.setAttribute("data-theme", dark?"light":"dark");
    btn.textContent = dark?"Dark":"Light";
  });
})();

// segmented + chips
$("#modeSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  mode=b.dataset.mode;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));});
$("#orderSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  order=b.dataset.order;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));});
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
  diff=c.dataset.diff;document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));}));
$("#lecSel").addEventListener("change",e=>lecture=e.target.value);

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(){
  let p = QUESTIONS.filter(q=>(diff==="all"||q.diff===diff)&&(lecture==="all"||q.lecture===lecture));
  p = p.map(q=>({...q}));
  return order==="shuffle"?shuffle(p):p;
}

$("#startBtn").addEventListener("click",start);
$("#againBtn").addEventListener("click",()=>{show("setup");});
$("#restartBtn").addEventListener("click",finish);
$("#nextBtn").addEventListener("click",next);

function start(){
  pool=buildPool();
  if(pool.length===0){alert("No questions match those filters. Try widening them.");return;}
  idx=0;score=0;show("quiz");render();
}
function show(id){["setup","quiz","done"].forEach(s=>$("#"+s).classList.toggle("hidden",s!==id));}

function render(){
  answered=false;
  const q=pool[idx];
  $("#counter").textContent = "Question "+(idx+1)+" of "+pool.length;
  $("#scoreLine").textContent = mode==="mcq" ? ("Score "+score+"/"+idx) : "";
  $("#prog").style.width = ((idx)/pool.length*100)+"%";
  $("#nextBtn").textContent = idx===pool.length-1 ? "Finish" : "Next";

  const dc = "d-"+(["easy","medium","hard"].includes(q.diff)?q.diff:"medium");
  let h = '<div class="tagline">'
        + '<span class="tag '+dc+'">'+q.diff+'</span>'
        + (q.topic?'<span class="tag">'+esc(q.topic)+'</span>':'')
        + '</div>'
        + '<p class="qtext">'+esc(q.q)+'</p>';

  if(mode==="mcq"){
    h += '<div class="opts">';
    q.opts.forEach((o,i)=>{ h += '<button class="opt" data-i="'+i+'"><span class="key">'+"ABCD"[i]+'</span><span>'+esc(o)+'</span></button>'; });
    h += '</div>';
    h += '<div class="exp" id="exp"><div class="lab2">Explanation</div><span>'+esc(q.exp)+'</span><div class="src">From: '+esc(q.lecture)+'</div></div>';
  } else {
    h += '<button class="reveal-btn" id="revealBtn">Reveal answer</button>';
    h += '<div class="recall-ans" id="recallAns"><div class="lab2">Answer</div>'
       + '<div class="ans">'+esc(q.opts[q.correct])+'</div>'
       + '<div class="exp show" style="margin-top:0"><div class="lab2">Why</div><span>'+esc(q.exp)+'</span>'
       + '<div class="src">From: '+esc(q.lecture)+'</div></div></div>';
  }
  $("#card").innerHTML=h;

  if(mode==="mcq"){
    $("#card").querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click",()=>choose(btn,q)));
  } else {
    $("#revealBtn").addEventListener("click",()=>{
      $("#recallAns").classList.add("show");
      $("#revealBtn").style.display="none";
    });
  }
}

function choose(btn,q){
  if(answered)return; answered=true;
  const chosen=+btn.dataset.i;
  const opts=$("#card").querySelectorAll(".opt");
  opts.forEach((b,i)=>{
    b.setAttribute("disabled","");
    if(i===q.correct)b.classList.add("correct");
    else if(i===chosen)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(chosen===q.correct)score++;
  $("#exp").classList.add("show");
  $("#scoreLine").textContent = "Score "+score+"/"+(idx+1);
}

function next(){
  if(idx>=pool.length-1){finish();return;}
  idx++;render();
}
function finish(){
  const total = mode==="mcq" ? (answered?idx+1:idx) : pool.length;
  show("done");
  if(mode==="mcq"){
    const denom = answered?idx+1:idx;
    const pct = denom>0?Math.round(score/denom*100):0;
    $("#finalScore").textContent = pct+"%";
    $("#finalLine").textContent = score+" correct out of "+denom+" answered.";
  } else {
    $("#finalScore").textContent = pool.length;
    $("#finalLine").textContent = "questions reviewed in recall mode.";
  }
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
</body>
</html>
