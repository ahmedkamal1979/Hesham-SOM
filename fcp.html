let pool=[],idx=0,right=0,seen=0,answered=false;
const lec=document.getElementById("lec"),diff=document.getElementById("diff"),stage=document.getElementById("stage"),score=document.getElementById("score");
const lectures=[...new Set(DATA.map(d=>d.lecture))].sort();
lec.innerHTML='<option value="ALL">All lectures</option>'+lectures.map(l=>`<option>${l}</option>`).join("");
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function build(){pool=DATA.filter(d=>(lec.value==="ALL"||d.lecture===lec.value)&&(diff.value==="ALL"||d.diff===diff.value));shuffle(pool);idx=0;right=0;seen=0;render();}
function render(){
 if(!pool.length){stage.innerHTML='<div class="card">No questions match this filter.</div>';score.textContent="";return;}
 if(idx>=pool.length){stage.innerHTML=`<div class="card"><div class="q">Round complete</div>You scored ${right} of ${seen}. Press Start to shuffle again.</div>`;score.textContent="";return;}
 const d=pool[idx];answered=false;
 let h=`<div class="card"><span class="tag">${esc(d.lecture)}</span><span class="tag">${esc(d.topic)}</span><span class="tag">${esc(d.diff)}</span>
  <div class="q">${esc(d.q)}</div><div class="opts">`;
 d.opts.forEach((o,i)=>{h+=`<button class="opt" data-i="${i}">${String.fromCharCode(65+i)}. ${esc(o)}</button>`;});
 h+=`</div><div class="exp" id="exp"><b>Correct: ${String.fromCharCode(65+d.correct)}.</b> ${esc(d.exp)}<div class="controls"><button class="primary" id="next">Next</button></div></div></div>`;
 stage.innerHTML=h;
 document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
   if(answered)return;answered=true;seen++;const pick=+b.getAttribute("data-i");
   document.querySelectorAll(".opt").forEach((x,i)=>{x.disabled=true;if(i===d.correct)x.classList.add("correct");else if(i===pick)x.classList.add("wrong");});
   if(pick===d.correct)right++;
   document.getElementById("exp").classList.add("show");
 });
 document.getElementById("next").onclick=()=>{idx++;render();};
 score.textContent=`Q ${idx+1} of ${pool.length} | score ${right}/${seen}`;
}
document.getElementById("start").onclick=build;build();
</script></body></html>
